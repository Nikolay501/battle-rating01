<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Эпичные схватки боевых магов — рейтинг</title>

  <link rel="stylesheet" href="style.css" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
</head>

<body>


  <div class="noise"></div>

  <!-- Новый прелоадер для карт -->
  <div class="preloader" id="preloader">
    <div class="cards-stack" id="preloaderCards">
      <!-- Карты будут добавляться сюда через JS -->
    </div>
  </div>

  <main class="app" id="app">
    <section class="hero">
      <div class="hero-content">
        <div class="badge">Настольная арена</div>

        <h1>
          Эпичный рейтинг
          <span>боевых магов</span>
        </h1>

        <p>
          Победы, жертвы и магическое превосходство.  
          Кто сегодня главный волшебник хаоса?
        </p>
      </div>
    </section>

    <section class="rating-section">
      <div class="section-header">
        <div>
          <h2>Таблица лидеров</h2>
          <p>Рейтинг обновляется по количеству побед и жертв.</p>
        </div>

        <div class="legend">
          <span><b>🏆</b> Победы</span>
          <span><b>💀</b> Жертвы</span>
        </div>
      </div>

      <div class="table-wrap">
        <table class="rating-table">
          <thead>
            <tr>
              <th>Место</th>
              <th>Игрок</th>
              <th>Победы</th>
              <th>Жертвы</th>
              <th>Статус</th>
            </tr>
          </thead>

          <tbody id="ratingBody">
            <!-- Строки создаются через JS -->
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
