<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Эпичный боевой магов — рейтинг</title>

  <link rel="stylesheet" href="style.css" />

  <!-- Можно подключить шрифт, если есть интернет -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
</head>

<body>
  <!-- 
    Фоновое изображение:
    Замени ссылку в style="" на свою.
  -->
  <div 
    class="page-bg"
    style="background-image: url('https://images.unsplash.com/photo-1511512578047-dfb367046420?auto=format&fit=crop&w=1600&q=80');"
  ></div>

  <div class="noise"></div>

  <!-- Прелоадер -->
  <div class="preloader" id="preloader">
    <div class="preloader-card">
      <div class="magic-orb"></div>
      <div class="preloader-title">Заряжаем заклинания...</div>
      <div class="preloader-bar">
        <span></span>
      </div>
      <div class="preloader-subtitle">Подсчитываем победы и жертвы</div>
    </div>
  </div>

  <!-- Основной контент -->
  <main class="app" id="app">
    <section class="hero">
      <div class="hero-content">
        <div class="badge">Настольная арена</div>

        <h1>
          Эпичный рейтинг
          <span>боевых магов</span>
        </h1>

        <p>
          Победы, жертвы и магическое превосходство.  
          Кто сегодня главный волшебник хаоса?
        </p>
      </div>
    </section>

    <section class="rating-section">
      <div class="section-header">
        <div>
          <h2>Таблица лидеров</h2>
          <p>Рейтинг обновляется по количеству побед и жертв.</p>
        </div>

        <div class="legend">
          <span><b>🏆</b> Победы</span>
          <span><b>💀</b> Жертвы</span>
        </div>
      </div>

      <div class="table-wrap">
        <table class="rating-table">
          <thead>
            <tr>
              <th>Место</th>
              <th>Игрок</th>
              <th>Победы</th>
              <th>Жертвы</th>
              <th>Статус</th>
            </tr>
          </thead>

          <tbody id="ratingBody">
            <!-- Строки создаются через JS -->
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
